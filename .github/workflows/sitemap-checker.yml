# Sitemap Status Checker
# Runs weekly and only notifies on issues or when Google indexing succeeds

name: Sitemap Status Checker

on:
  # Run once per week (Monday 9 AM UTC)
  schedule:
    - cron: '0 9 * * 1'

  # Allow manual trigger
  workflow_dispatch:

jobs:
  check-sitemap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check Sitemap Status
        id: sitemap
        run: |
          SITEMAP_URL="https://hanysharaf.github.io/sleepwisereviews/sitemap.xml"

          # Try to fetch the sitemap
          HTTP_STATUS=$(curl -s -o /tmp/sitemap.xml -w "%{http_code}" "$SITEMAP_URL")

          if [ "$HTTP_STATUS" = "200" ]; then
            # Count URLs in sitemap
            URL_COUNT=$(grep -c "<loc>" /tmp/sitemap.xml || echo "0")
            echo "status=success" >> $GITHUB_OUTPUT
            echo "url_count=$URL_COUNT" >> $GITHUB_OUTPUT
            echo "✅ Sitemap is accessible with $URL_COUNT URLs"
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "url_count=0" >> $GITHUB_OUTPUT
            echo "❌ Sitemap returned HTTP $HTTP_STATUS"
          fi

      # Only send notification if there's a PROBLEM
      - name: Send Alert on Failure
        if: steps.sitemap.outputs.status == 'failed'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="HTML" \
            -d text="🔴 <b>SleepWise Sitemap Alert</b>

          ❌ Sitemap is not accessible!

          Please check:
          • GitHub Pages deployment
          • sitemap.xml file exists

          🔗 <a href=\"https://hanysharaf.github.io/sleepwisereviews/sitemap.xml\">View Sitemap</a>"

      # Log success but don't spam Telegram
      - name: Log Success (No Notification)
        if: steps.sitemap.outputs.status == 'success'
        run: |
          echo "✅ Sitemap check passed: ${{ steps.sitemap.outputs.url_count }} URLs"
          echo "No Telegram notification sent (only alerts on issues)"
